{% extends "base.html" %}
{% block title %}{% if post %}Edit Post{% else %}New Post{% endif %}{% endblock %}

{% block topbar %}
<div class="bg-black text-white text-sm py-2">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
        <span>Admin: <strong>{{ session.user_name }}</strong></span>
        <a href="{{ url_for('admin.blog_list') }}" class="hover:underline">&larr; Back to Blog</a>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-black mb-8">{% if post %}Edit Post{% else %}New Post{% endif %}</h1>

    <form method="POST" action="{% if post %}{{ url_for('admin.blog_edit', post_id=post.id) }}{% else %}{{ url_for('admin.blog_new') }}{% endif %}">
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Title</label>
                <input type="text" name="title" value="{{ post.title if post else '' }}" required placeholder="Post title"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500">
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                    <select name="category" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500">
                        {% for cat in ['Market Updates', 'Product Spotlights', 'Food Safety', 'Business Tips', 'Company News'] %}
                        <option {% if post and post.category == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500">
                        <option value="draft" {% if not post or post.status == 'draft' %}selected{% endif %}>Draft</option>
                        <option value="published" {% if post and post.status == 'published' %}selected{% endif %}>Published</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Excerpt</label>
                <textarea name="excerpt" rows="2" placeholder="Short summary for blog listing..."
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500">{{ post.excerpt if post else '' }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Content (HTML)</label>
                <textarea name="content" rows="15" placeholder="Paste your post content here (HTML supported)..."
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500 font-mono text-sm">{{ post.content if post else '' }}</textarea>
            </div>
        </div>

        <div class="mt-8 flex gap-4">
            <button type="submit" class="bg-accent-500 hover:bg-accent-600 text-black px-8 py-3 rounded-lg font-semibold transition">
                {% if post %}Update Post{% else %}Create Post{% endif %}
            </button>
            <a href="{{ url_for('admin.blog_list') }}" class="text-gray-500 hover:text-black px-4 py-3 font-semibold">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
