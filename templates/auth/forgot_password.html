{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
    <section class="min-h-[60vh] flex items-center justify-center py-16">
        <div class="w-full max-w-md px-4">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-black">Reset Password</h1>
                    <p class="text-gray-500 mt-2">Enter your email and we'll send you a link to reset your password.</p>
                </div>
                <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                        <input type="email" name="email" placeholder="you@business.com" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition">
                    </div>
                    <button type="submit"
                        class="w-full bg-accent-500 hover:bg-accent-600 text-black py-3 rounded-lg font-semibold text-lg transition">
                        Send Reset Link
                    </button>
                </form>
                <div class="mt-6 text-center text-sm text-gray-500">
                    <a href="{{ url_for('auth.login') }}" class="text-accent-600 font-semibold hover:underline">&larr; Back to login</a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
