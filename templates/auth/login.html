{% extends "base.html" %}
{% block title %}Client Login{% endblock %}

{% block content %}
    <section class="min-h-[70vh] flex items-center justify-center py-16">
        <div class="w-full max-w-md px-4">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
                <div class="text-center mb-8">
                    <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="D&H Meats" class="h-20 w-auto mx-auto mb-4">
                    <h1 class="text-2xl font-bold text-black">Client Portal</h1>
                    <p class="text-gray-500 mt-2">Sign in to access flash deals, live inventory, and manage your account.</p>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                        <input type="email" name="email" placeholder="you@business.com" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition">
                    </div>
                    <div class="flex items-center justify-end text-sm">
                        <a href="{{ url_for('auth.forgot_password') }}" class="text-accent-600 hover:underline font-medium">Forgot password?</a>
                    </div>
                    <button type="submit"
                        class="w-full bg-accent-500 hover:bg-accent-600 text-black py-3 rounded-lg font-semibold text-lg transition">
                        Sign In
                    </button>
                </form>
                <div class="mt-6 text-center text-sm text-gray-500">
                    Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-accent-600 font-semibold hover:underline">Apply here</a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
