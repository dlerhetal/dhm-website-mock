{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}

{% block content %}
    <section class="min-h-[60vh] flex items-center justify-center py-16">
        <div class="w-full max-w-md px-4">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-black">Set New Password</h1>
                    <p class="text-gray-500 mt-2">Choose a new password for your account.</p>
                </div>
                <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
                        <input type="password" name="password" placeholder="At least 8 characters" required minlength="8"
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                        <input type="password" name="confirm_password" placeholder="Type it again" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition">
                    </div>
                    <button type="submit"
                        class="w-full bg-accent-500 hover:bg-accent-600 text-black py-3 rounded-lg font-semibold text-lg transition">
                        Reset Password
                    </button>
                </form>
            </div>
        </div>
    </section>
{% endblock %}
